// Root project. The actual builds live in the per-loader subprojects.
//
// Aggregate `build` task delegates to all subprojects:
//   ./gradlew build
//
// Build a single loader:
//   ./gradlew :fabric:build
//   ./gradlew :forge:build
//   ./gradlew :neoforge:build

allprojects {
	group = "com.mukse"
	version = project.findProperty("mod_version") ?: "0.0.0"
}

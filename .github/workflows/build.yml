name: Build all 1.21.x versions

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21"
            yarn: "1.21+build.9"
            loader: "0.16.10"
          - mc: "1.21.1"
            yarn: "1.21.1+build.3"
            loader: "0.16.10"
          - mc: "1.21.2"
            yarn: "1.21.2+build.1"
            loader: "0.16.10"
          - mc: "1.21.3"
            yarn: "1.21.3+build.2"
            loader: "0.16.10"
          - mc: "1.21.4"
            yarn: "1.21.4+build.8"
            loader: "0.16.10"
          - mc: "1.21.5"
            yarn: "1.21.5+build.1"
            loader: "0.16.14"
          - mc: "1.21.6"
            yarn: "1.21.6+build.1"
            loader: "0.16.14"
          - mc: "1.21.7"
            yarn: "1.21.7+build.8"
            loader: "0.16.14"
          - mc: "1.21.8"
            yarn: "1.21.8+build.1"
            loader: "0.17.2"
          - mc: "1.21.9"
            yarn: "1.21.9+build.1"
            loader: "0.17.2"
          - mc: "1.21.10"
            yarn: "1.21.10+build.3"
            loader: "0.19.3"
          - mc: "1.21.11"
            yarn: "1.21.11+build.6"
            loader: "0.19.3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Patch gradle.properties for Minecraft ${{ matrix.mc }}
        run: |
          sed -i -E "s|^minecraft_version\s*=.*|minecraft_version = ${{ matrix.mc }}|"  gradle.properties
          sed -i -E "s|^yarn_mappings\s*=.*|yarn_mappings = ${{ matrix.yarn }}|"        gradle.properties
          sed -i -E "s|^loader_version\s*=.*|loader_version = ${{ matrix.loader }}|"   gradle.properties
          echo "--- gradle.properties ---"
          cat gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Collect output jar
        run: |
          mkdir -p dist
          main_jar=$(find build/libs -maxdepth 1 -name "whenchat-*.jar" ! -name "*-sources.jar" | head -1)
          if [ -z "$main_jar" ]; then
            echo "::error::No main jar produced!"
            ls -la build/libs/ || true
            exit 1
          fi
          cp "$main_jar" "dist/whenchat-mc${{ matrix.mc }}.jar"
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whenchat-mc${{ matrix.mc }}
          path: dist/*.jar
          if-no-files-found: error

      # When triggered by a v* tag push, publish a dedicated release for THIS MC version.
      # Example: pushing tag v1.0.0 creates releases v1.0.0-mc1.21, v1.0.0-mc1.21.1, ...
      - name: Publish release for Minecraft ${{ matrix.mc }}
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-mc${{ matrix.mc }}
          name: "WhenChat ${{ github.ref_name }} - Minecraft ${{ matrix.mc }}"
          body: |
            **WhenChat ${{ github.ref_name }}** for **Minecraft ${{ matrix.mc }}** (Fabric).

            Drop the JAR below into your Minecraft instance's `mods/` folder.

            - Fabric Loader: ${{ matrix.loader }}
            - Yarn mappings: ${{ matrix.yarn }}
            - Java: 21
          files: dist/whenchat-mc${{ matrix.mc }}.jar
          fail_on_unmatched_files: true

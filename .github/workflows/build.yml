name: Build all loaders + MC versions

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fabric:
    name: Fabric ${{ matrix.mc }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.19"
            yarn: "1.19+build.4"
            loader: "0.14.21"
          - mc: "1.19.1"
            yarn: "1.19.1+build.6"
            loader: "0.14.21"
          - mc: "1.19.2"
            yarn: "1.19.2+build.28"
            loader: "0.14.21"
          - mc: "1.19.3"
            yarn: "1.19.3+build.5"
            loader: "0.14.21"
          - mc: "1.19.4"
            yarn: "1.19.4+build.2"
            loader: "0.14.21"
          - mc: "1.20"
            yarn: "1.20+build.1"
            loader: "0.16.10"
          - mc: "1.20.1"
            yarn: "1.20.1+build.10"
            loader: "0.16.10"
          - mc: "1.20.2"
            yarn: "1.20.2+build.4"
            loader: "0.16.10"
          - mc: "1.20.3"
            yarn: "1.20.3+build.1"
            loader: "0.16.10"
          - mc: "1.20.4"
            yarn: "1.20.4+build.3"
            loader: "0.16.10"
          - mc: "1.20.5"
            yarn: "1.20.5+build.1"
            loader: "0.16.10"
          - mc: "1.20.6"
            yarn: "1.20.6+build.3"
            loader: "0.16.10"
          - mc: "1.21"
            yarn: "1.21+build.9"
            loader: "0.16.10"
          - mc: "1.21.1"
            yarn: "1.21.1+build.3"
            loader: "0.16.10"
          - mc: "1.21.2"
            yarn: "1.21.2+build.1"
            loader: "0.16.10"
          - mc: "1.21.3"
            yarn: "1.21.3+build.2"
            loader: "0.16.10"
          - mc: "1.21.4"
            yarn: "1.21.4+build.8"
            loader: "0.16.10"
          - mc: "1.21.5"
            yarn: "1.21.5+build.1"
            loader: "0.16.14"
          - mc: "1.21.6"
            yarn: "1.21.6+build.1"
            loader: "0.16.14"
          - mc: "1.21.7"
            yarn: "1.21.7+build.8"
            loader: "0.16.14"
          - mc: "1.21.8"
            yarn: "1.21.8+build.1"
            loader: "0.17.2"
          - mc: "1.21.9"
            yarn: "1.21.9+build.1"
            loader: "0.17.2"
          - mc: "1.21.10"
            yarn: "1.21.10+build.3"
            loader: "0.19.3"
          - mc: "1.21.11"
            yarn: "1.21.11+build.6"
            loader: "0.19.3"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Patch gradle.properties
        run: |
          sed -i -E "s|^minecraft_version\s*=.*|minecraft_version = ${{ matrix.mc }}|"  gradle.properties
          sed -i -E "s|^yarn_mappings\s*=.*|yarn_mappings = ${{ matrix.yarn }}|"        gradle.properties
          sed -i -E "s|^loader_version\s*=.*|loader_version = ${{ matrix.loader }}|"   gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Fabric jar
        run: ./gradlew :fabric:build --no-daemon --stacktrace

      - name: Collect output
        run: |
          mkdir -p dist
          main_jar=$(find fabric/build/libs -maxdepth 1 -name "whenchat-fabric-*.jar" ! -name "*-sources.jar" | head -1)
          if [ -z "$main_jar" ]; then echo "::error::No Fabric jar"; exit 1; fi
          cp "$main_jar" "dist/whenchat-fabric-mc${{ matrix.mc }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: whenchat-fabric-mc${{ matrix.mc }}
          path: dist/*.jar
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-mc${{ matrix.mc }}
          name: "WhenChat ${{ github.ref_name }} - Minecraft ${{ matrix.mc }}"
          body: |
            **WhenChat ${{ github.ref_name }}** for **Minecraft ${{ matrix.mc }}**.

            Pick the JAR that matches your loader:
            - `whenchat-fabric-mc${{ matrix.mc }}.jar` — Fabric
            - `whenchat-neoforge-mc${{ matrix.mc }}.jar` — NeoForge (only attached for MC 1.20.5+)
            - `whenchat-forge-mc${{ matrix.mc }}.jar` — Forge (only attached for MC 1.20.5+)
          files: dist/whenchat-fabric-mc${{ matrix.mc }}.jar
          fail_on_unmatched_files: true

  neoforge:
    name: NeoForge ${{ matrix.mc }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.6"
            neoforge: "20.6.139"
          - mc: "1.21"
            neoforge: "21.0.167"
          - mc: "1.21.1"
            neoforge: "21.1.233"
          - mc: "1.21.3"
            neoforge: "21.3.96"
          - mc: "1.21.4"
            neoforge: "21.4.157"
          - mc: "1.21.5"
            neoforge: "21.5.97"
          - mc: "1.21.8"
            neoforge: "21.8.53"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Patch gradle.properties
        run: |
          sed -i -E "s|^minecraft_version\s*=.*|minecraft_version = ${{ matrix.mc }}|"  gradle.properties
          sed -i -E "s|^neoforge_version\s*=.*|neoforge_version = ${{ matrix.neoforge }}|" gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build NeoForge jar
        run: ./gradlew :neoforge:build --no-daemon --stacktrace

      - name: Collect output
        run: |
          mkdir -p dist
          main_jar=$(find neoforge/build/libs -maxdepth 1 -name "whenchat-neoforge-*.jar" ! -name "*-sources.jar" | head -1)
          if [ -z "$main_jar" ]; then echo "::error::No NeoForge jar"; exit 1; fi
          cp "$main_jar" "dist/whenchat-neoforge-mc${{ matrix.mc }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: whenchat-neoforge-mc${{ matrix.mc }}
          path: dist/*.jar
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-mc${{ matrix.mc }}
          name: "WhenChat ${{ github.ref_name }} - Minecraft ${{ matrix.mc }}"
          files: dist/whenchat-neoforge-mc${{ matrix.mc }}.jar
          fail_on_unmatched_files: true

  forge:
    name: Forge ${{ matrix.mc }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.6"
            forge: "50.1.0"
          - mc: "1.21"
            forge: "51.0.33"
          - mc: "1.21.1"
            forge: "52.0.40"
          - mc: "1.21.3"
            forge: "53.0.34"
          - mc: "1.21.4"
            forge: "54.1.6"
          - mc: "1.21.5"
            forge: "55.0.22"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Patch gradle.properties
        run: |
          sed -i -E "s|^minecraft_version\s*=.*|minecraft_version = ${{ matrix.mc }}|"  gradle.properties
          sed -i -E "s|^forge_version\s*=.*|forge_version = ${{ matrix.forge }}|" gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Forge jar
        run: ./gradlew :forge:build --no-daemon --stacktrace

      - name: Collect output
        run: |
          mkdir -p dist
          main_jar=$(find forge/build/libs -maxdepth 1 -name "whenchat-forge-*.jar" ! -name "*-sources.jar" | head -1)
          if [ -z "$main_jar" ]; then echo "::error::No Forge jar"; exit 1; fi
          cp "$main_jar" "dist/whenchat-forge-mc${{ matrix.mc }}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: whenchat-forge-mc${{ matrix.mc }}
          path: dist/*.jar
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-mc${{ matrix.mc }}
          name: "WhenChat ${{ github.ref_name }} - Minecraft ${{ matrix.mc }}"
          files: dist/whenchat-forge-mc${{ matrix.mc }}.jar
          fail_on_unmatched_files: true

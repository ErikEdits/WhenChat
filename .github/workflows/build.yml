name: Build all 1.21.x versions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.21"
            yarn: "1.21+build.9"
            loader: "0.16.10"
          - mc: "1.21.1"
            yarn: "1.21.1+build.3"
            loader: "0.16.10"
          - mc: "1.21.2"
            yarn: "1.21.2+build.1"
            loader: "0.16.10"
          - mc: "1.21.3"
            yarn: "1.21.3+build.2"
            loader: "0.16.10"
          - mc: "1.21.4"
            yarn: "1.21.4+build.8"
            loader: "0.16.10"
          - mc: "1.21.5"
            yarn: "1.21.5+build.1"
            loader: "0.16.14"
          - mc: "1.21.6"
            yarn: "1.21.6+build.1"
            loader: "0.16.14"
          - mc: "1.21.7"
            yarn: "1.21.7+build.8"
            loader: "0.16.14"
          - mc: "1.21.8"
            yarn: "1.21.8+build.1"
            loader: "0.17.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Patch gradle.properties for Minecraft ${{ matrix.mc }}
        run: |
          sed -i -E "s|^minecraft_version\s*=.*|minecraft_version = ${{ matrix.mc }}|"  gradle.properties
          sed -i -E "s|^yarn_mappings\s*=.*|yarn_mappings = ${{ matrix.yarn }}|"        gradle.properties
          sed -i -E "s|^loader_version\s*=.*|loader_version = ${{ matrix.loader }}|"   gradle.properties
          echo "--- gradle.properties ---"
          cat gradle.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace

      - name: Rename output jar
        run: |
          mkdir -p dist
          mv build/libs/whenchat-*.jar dist/whenchat-mc${{ matrix.mc }}.jar 2>/dev/null || true
          # remove sources jar from artifact
          rm -f dist/*-sources.jar
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whenchat-mc${{ matrix.mc }}
          path: dist/*.jar
          if-no-files-found: error

  release:
    name: Attach jars to release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -name "*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
